version: 2
updates:
  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'sunday'
    open-pull-requests-limit: 10
    allow:
      - dependency-type: 'development'
    labels:
      - 'dependencies'
      - 'dev-dependencies'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'sunday'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore(gha)'
      include: 'scope'
