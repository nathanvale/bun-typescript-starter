name: Changesets Pre-Mode Toggle

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'enter or exit'
        required: true
        default: 'enter'
      channel:
        description: 'beta | rc | next'
        required: true
        default: 'beta'

concurrency:
  group: ${{ github.workflow }}-${{ inputs.action }}-${{ inputs.channel }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  toggle:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # Shallow clone is sufficient for pre-mode branch toggle
        with:
          fetch-depth: 1
      - name: Standard CI Env
        uses: ./.github/actions/standard-ci-env
      - name: Setup Bun
        uses: ./.github/actions/setup-bun
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
      - name: Validate GitHub App credentials
        env:
          APP_ID: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          if [ -z "${APP_ID}" ] || [ -z "${APP_PRIVATE_KEY}" ]; then
            echo "::error::Missing GitHub App credentials. Set repository variable APP_ID and secret APP_PRIVATE_KEY so pre-mode PRs are created with a token that can trigger downstream checks."
            exit 1
          fi
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Create pre-mode toggle branch
        id: prep
        env:
          ACTION: ${{ inputs.action }}
          CHANNEL: ${{ inputs.channel }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: ./.github/scripts/pre-mode-toggle.sh
      - name: Open PR to toggle pre-mode
        if: steps.prep.outcome == 'success'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          HEAD_REF: ${{ steps.prep.outputs.BRANCH }}
          ACTION: ${{ inputs.action }}
          CHANNEL: ${{ inputs.channel }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const title = `chore(pre): ${process.env.ACTION} ${process.env.CHANNEL} channel`
            const body = 'Automated Changesets pre-mode toggle PR.'
            const label = 'release:pre-toggle'
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: process.env.HEAD_REF,
              base: 'main',
              title,
              body,
              maintainer_can_modify: true,
            })
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              })
            } catch (error) {
              if (error.status !== 404) throw error
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: '5319e7',
                description: 'Automated prerelease mode toggle PRs',
              })
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [label]
            })
            core.info(`Opened PR #${pr.number} for pre-mode toggle`)
