name: Dependabot Auto-Merge
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
jobs:
  auto-merge:
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Require auto-mergeable label
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: labels
        with:
          script: |
            const labels = (context.payload.pull_request.labels || []).map(l => l.name)
            // Accept both the legacy/general dependency label and the
            // template-specific labels so existing repos keep flowing.
            const allowed = ['dependencies', 'dev-dependencies', 'github_actions']
            const hasAllowed = labels.some(l => allowed.includes(l))
            if (!hasAllowed) {
              core.setFailed(`PR labels [${labels.join(', ')}] do not include any of: ${allowed.join(', ')}`)
            }

      - name: Check changed files are safe to auto-merge
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: diff
        with:
          script: |
            const pr = context.payload.pull_request
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            })
            const filenames = files.map(f => f.filename)
            const allowed = [
              'package.json',
              'pnpm-lock.yaml',
              'package-lock.json',
              'yarn.lock',
              'bun.lock',
            ]
            const isGHA = filenames.every(f => f.startsWith('.github/'))
            const isDeps = filenames.every(f => allowed.includes(f))
            if (!isGHA && !isDeps) {
              core.setFailed('PR touches files outside dependency manifests and .github/')
            }

      - name: Dependabot metadata
        if: steps.diff.outcome == 'success' && steps.labels.outcome == 'success'
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2.5.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve and enable auto-merge
        if: steps.diff.outcome == 'success' && steps.labels.outcome == 'success' && (steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch')
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request

            // Approve the PR
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event: 'APPROVE',
              body: 'Auto-approved: minor/patch dependency update with safe file changes.',
            })
            core.info(`Approved PR #${pr.number}`)

            const unstableStatus = 'Pull request Pull request is in unstable status'
            for (let attempt = 1; attempt <= 18; attempt++) {
              try {
                // GitHub can reject this briefly while checks are still settling.
                await github.graphql(`
                  mutation($prId: ID!) {
                    enablePullRequestAutoMerge(input: { pullRequestId: $prId, mergeMethod: SQUASH }) { clientMutationId }
                  }
                `, { prId: pr.node_id })
                core.info(`Auto-merge enabled for PR #${pr.number}`)
                return
              } catch (error) {
                const message = error instanceof Error ? error.message : String(error)
                if (!message.includes(unstableStatus) || attempt === 18) {
                  throw error
                }

                core.info(
                  `PR #${pr.number} is still unstable; retrying auto-merge enable in 10s (${attempt}/18).`,
                )
                await new Promise((resolve) => setTimeout(resolve, 10_000))
              }
            }
