name: Auto-generate Changeset (PR)

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.title != 'chore: version packages'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Detect existing changeset
        id: detect
        shell: bash
        run: ./.github/scripts/changeset-detect-existing.sh .changeset
      - name: Setup Bun
        uses: ./.github/actions/setup-bun
      - name: Install deps (minimal)
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Generate changeset if missing
        if: steps.detect.outputs.found == '0'
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: ./.github/scripts/changeset-generate-if-missing.sh
      - name: Annotate PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const missing = '${{ steps.detect.outputs.found }}' === '0'
            const marker = '<!-- sq:auto-changeset -->'
            const body = `${marker}\n${missing ? 'Auto-generated a changeset for this PR.' : 'Changeset already present.'}`
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                per_page: 100,
              }
            )
            const existing = comments.find(comment =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
              return
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            })
