# Consolidated Publish Workflow
#
# Capabilities:
# - Auto-publish from main (stable releases via changesets)
# - Manual version bumps for pre-releases (next, beta, rc)
# - Manual publish for pre-releases
# - Canary snapshot publishing
#
# Intent modes:
# - auto: Standard changesets flow (open PR or publish on main)
# - version: Create pre-release version bump PR
# - publish: Publish pre-release to npm
# - snapshot: Create canary snapshot release
#
# Publishing prefers OIDC trusted publishing on GitHub-hosted runners.
# For a brand-new npm package, keep a short-lived granular NPM_TOKEN only
# for bootstrap, then remove it after trusted publishing is configured.

name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      intent:
        description: 'auto | version | publish | snapshot'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - version
          - publish
          - snapshot
      channel:
        description: 'Pre-release channel (next, beta, rc)'
        required: false
        default: 'next'
        type: choice
        options:
          - next
          - beta
          - rc

permissions:
  contents: read
  actions: read

jobs:
  auto-release:
    name: Auto release
    if: github.event_name == 'push' || inputs.intent == 'auto'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: publish-auto-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - name: Prepare publish workspace
        id: prep
        uses: ./.github/actions/prepare-publish-workspace
        with:
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          setup-node: 'true'
          install-changesets-cli: 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Changesets - open PR or publish
        id: changesets
        uses: changesets/action@c48e67d110a68bc90ccf1098e9646092baacaa87 # v1.6.0
        with:
          publish: bash .github/scripts/changesets-publish.sh
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ steps.prep.outputs.app-token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: 0

      - name: Create GitHub Release (stable)
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.prep.outputs.app-token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "Creating GitHub release for ${TAG}"
          if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
            git tag "${TAG}"
            git push origin "${TAG}"
          else
            echo "Tag ${TAG} already exists, skipping tag creation"
          fi
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes-file CHANGELOG.md \
              --verify-tag
          else
            echo "Release ${TAG} already exists, skipping release creation"
          fi

  prerelease-version:
    name: Prerelease version bump
    if: github.event_name == 'workflow_dispatch' && inputs.intent == 'version'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: prerelease-version-${{ inputs.channel }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Prepare release workspace
        id: prep
        uses: ./.github/actions/prepare-publish-workspace
        with:
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Validate pre-mode state
        run: |
          if [ ! -f .changeset/pre.json ]; then
            echo "::error::Not in pre-release mode. Run 'Changesets Pre-Mode Toggle' workflow first."
            exit 1
          fi
          echo "Pre-mode active, proceeding with version."

      - name: Build
        run: bun run build

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Version prerelease
        env:
          GITHUB_TOKEN: ${{ steps.prep.outputs.app-token }}
          HUSKY: '0'
        run: |
          bun run version:pre
          bunx biome format --write .changeset/ || true
          git checkout -- bunfig.toml 2>/dev/null || true
          if git diff --staged --quiet && git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          BRANCH="release/${{ inputs.channel }}-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "chore(prerelease): version bump on ${{ inputs.channel }} channel"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore(prerelease): version bump on ${{ inputs.channel }} channel" \
            --body "Automated prerelease version bump for the ${{ inputs.channel }} channel." \
            --base main)
          echo "Created PR: $PR_URL"
          gh pr merge "$PR_URL" --auto --squash

  prerelease-publish:
    name: Prerelease publish
    if: github.event_name == 'workflow_dispatch' && inputs.intent == 'publish'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: prerelease-publish-${{ inputs.channel }}
      cancel-in-progress: false
    environment:
      name: manual-release
    permissions:
      contents: write
      id-token: write
      actions: read
    steps:
      - name: Prepare publish workspace
        id: prep
        uses: ./.github/actions/prepare-publish-workspace
        with:
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          setup-node: 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Validate pre-mode state
        run: |
          if [ ! -f .changeset/pre.json ]; then
            echo "::error::Not in pre-release mode. Run 'Changesets Pre-Mode Toggle' workflow first."
            exit 1
          fi
          echo "Pre-mode active, proceeding with publish."

      - name: Build
        run: bun run build

      - name: Configure npm auth for publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "npm version: $(npm --version)"
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "::notice::NPM_TOKEN detected; using token auth (bootstrap/fallback mode)."
            cat <<'EOF' > ~/.npmrc
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          registry=https://registry.npmjs.org
          always-auth=true
          EOF
          else
            echo "::notice::No NPM_TOKEN; relying on OIDC trusted publishing."
            echo "::notice::Ensure trusted publisher is configured at: npmjs.com → package Settings → Trusted Publisher"
          fi

      - name: Publish prerelease
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ steps.prep.outputs.app-token }}
        run: bun run publish:pre

      - name: Create GitHub Release (Prerelease)
        env:
          GITHUB_TOKEN: ${{ steps.prep.outputs.app-token }}
          HUSKY: '0'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "Creating GitHub prerelease for ${TAG}"
          if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
            git tag "${TAG}"
            git push origin "${TAG}"
          fi
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes "Prerelease version published to npm with tag: ${{ inputs.channel }}" \
              --prerelease
          else
            echo "Release ${TAG} already exists, skipping release creation"
          fi

  snapshot-release:
    name: Snapshot publish
    if: github.event_name == 'workflow_dispatch' && inputs.intent == 'snapshot'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: snapshot-release-${{ github.ref }}
      cancel-in-progress: false
    environment:
      name: manual-release
    permissions:
      contents: write
      id-token: write
      actions: read
    steps:
      - name: Prepare publish workspace
        id: prep
        uses: ./.github/actions/prepare-publish-workspace
        with:
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          setup-node: 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: bun run build

      - name: Configure npm auth for publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "npm version: $(npm --version)"
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "::notice::NPM_TOKEN detected; using token auth (bootstrap/fallback mode)."
            cat <<'EOF' > ~/.npmrc
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          registry=https://registry.npmjs.org
          always-auth=true
          EOF
          else
            echo "::notice::No NPM_TOKEN; relying on OIDC trusted publishing."
            echo "::notice::Ensure trusted publisher is configured at: npmjs.com → package Settings → Trusted Publisher"
          fi

      - name: Canary snapshot publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ steps.prep.outputs.app-token }}
        run: bun run release:snapshot:canary
