name: Auto-merge Version Packages PR

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: |
      github.event.pull_request.title == 'chore: version packages' &&
      github.event.pull_request.user.type == 'Bot' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'changeset-release/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Validate GitHub App credentials
        env:
          APP_ID: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          if [ -z "${APP_ID}" ] || [ -z "${APP_PRIVATE_KEY}" ]; then
            echo "::error::Missing GitHub App credentials. Set repository variable APP_ID and secret APP_PRIVATE_KEY so version package PRs can dispatch checks and enable native auto-merge."
            exit 1
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Enable PR auto-merge (squash)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const pr = context.payload.pull_request
            const unstableStatus = 'Pull request Pull request is in unstable status'
            for (let attempt = 1; attempt <= 18; attempt++) {
              try {
                await github.graphql(`
                  mutation($prId: ID!) {
                    enablePullRequestAutoMerge(input: { pullRequestId: $prId, mergeMethod: SQUASH }) { clientMutationId }
                  }
                `, { prId: pr.node_id })
                core.info('Auto-merge enabled for Version Packages PR')
                return
              } catch (error) {
                const message = error instanceof Error ? error.message : String(error)
                if (!message.includes(unstableStatus) || attempt === 18) {
                  throw error
                }

                core.info(
                  `Version Packages PR is still unstable; retrying auto-merge enable in 10s (${attempt}/18).`,
                )
                await new Promise((resolve) => setTimeout(resolve, 10_000))
              }
            }

      # GITHUB_TOKEN PRs don't trigger workflows (GitHub anti-recursion).
      # Dispatch pr-quality.yml using the App token so the required "All
      # checks passed" gate job runs and branch protection is satisfied.
      - name: Trigger PR quality checks on version branch
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const branch = context.payload.pull_request.head.ref
            core.info(`Dispatching PR quality workflow on ${branch}`)
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pr-quality.yml',
              ref: branch,
            })
            core.info('PR quality workflow dispatched')
